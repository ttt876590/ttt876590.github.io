<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍰 吃货属性测试｜20题超准版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "微软雅黑", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fff8e1, #ffecb3, #ffe0b2, #ffccbc);
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
            min-height: 100vh;
            animation: bgGradient 6s infinite alternate ease-in-out;
            background-size: 200% 200%;
        }

        @keyframes bgGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 36px;
            margin-bottom: 20px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.07);
            animation: cardFadeIn 0.7s ease forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes cardFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            color: #ff9800;
            font-size: 28px;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .sub-title {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .question {
            font-size: 19px;
            color: #333;
            margin: 24px 0;
            line-height: 1.7;
            text-align: center;
            animation: questionPop 0.5s ease;
            font-weight: 500;
        }

        @keyframes questionPop {
            0% { opacity: 0; transform: scale(0.9) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .btn {
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 17px;
            width: 100%;
            font-size: 16px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 14px rgba(255, 152, 0, 0.25);
            position: relative;
            overflow: hidden;
        }

        .btn:before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover:before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 18px rgba(255, 152, 0, 0.35);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .result-title {
            font-size: 26px;
            color: #ff9800;
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
            animation: resultBigPop 0.7s ease;
        }

        @keyframes resultBigPop {
            0% { transform: scale(0.7); opacity: 0; }
            50% { transform: scale(1.12); }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-desc {
            font-size: 17px;
            color: #444;
            line-height: 1.9;
            margin: 14px 0;
            text-align: center;
            animation: fadeUp 0.6s ease 0.2s forwards;
            opacity: 0;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
            from { opacity: 0; transform: translateY(10px); }
        }

        .restart {
            background: #fff;
            color: #ff9800;
            border: 2px solid #ff9800;
            margin-top: 25px;
        }

        .progress {
            width: 100%;
            height: 8px;
            background: #f5f5f5;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff9800, #ffb74d);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-radius: 10px;
        }

        .tip {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-top: 12px;
        }
    </style>
</head>

<body>

<div class="card" id="startBox">
    <h1 class="title">🍰 吃货属性测试</h1>
    <p class="sub-title">20题测出你的吃货等级</p>
    <button class="btn" onclick="startTest()">开始测试</button>
    <div class="tip">💡 凭第一直觉选，结果超准！</div>
</div>

<div class="card" id="testBox" style="display:none;">
    <div class="progress">
        <div class="progress-bar" id="progress"></div>
    </div>
    <div id="questionArea"></div>
    <button class="btn" onclick="next(1)">A 完全符合</button>
    <button class="btn" onclick="next(2)">B 比较符合</button>
    <button class="btn" onclick="next(3)">C 不太符合</button>
    <button class="btn" onclick="next(4)">D 完全不符合</button>
</div>

<div class="card" id="resultBox" style="display:none;">
    <div id="resultArea"></div>
    <button class="btn restart" onclick="restartTest()">重新测试</button>
</div>

<script>
    let score = 0;
    let current = 0;

    const questions = [
        "1. 闻到美食香味，你会立刻心动。",
        "2. 你开心时最想做的事是吃好吃的。",
        "3. 你不开心时也会想吃东西解压。",
        "4. 看到美食，你会忍不住拍照。",
        "5. 你愿意为了吃一家店专门跑很远。",
        "6. 你睡前经常会饿，想吃宵夜。",
        "7. 你对美食很有耐心，愿意排队。",
        "8. 你很会找好吃的，朋友都问你推荐。",
        "9. 你吃东西时幸福感特别强。",
        "10. 你喜欢尝试各种新奇口味。",
        "11. 你心情不好，吃一顿就好很多。",
        "12. 你出门旅游最在意当地美食。",
        "13. 你很能吃，但依然很快乐。",
        "14. 你对好吃的东西完全没有抵抗力。",
        "15. 你会为了美食原谅很多事情。",
        "16. 你觉得人生最重要的事之一是吃。",
        "17. 你喜欢研究菜单、看美食视频。",
        "18. 你吃到好吃的会心情变好一整天。",
        "19. 你宁愿吃撑，也不想浪费美食。",
        "20. 你觉得美食能治愈一切不开心。"
    ];

    const results = [
        {
            title: "🍓 温柔小吃货",
            desc: "你是温柔可爱的小吃货！喜欢甜甜的、软软的美食，吃东西时特别治愈，你简单又容易满足，一顿好吃的就能让你快乐一整天～"
        },
        {
            title: "🍔 快乐干饭人",
            desc: "你是标准快乐干饭人！吃饭超香，不挑食、不纠结，吃什么都很幸福。你性格开朗、人缘超好，大家都喜欢跟你一起吃饭！"
        },
        {
            title: "🍜 资深美食家",
            desc: "你是资深美食家！很懂吃、很会吃，对味道有自己的要求，眼光超准。你不仅爱吃，还会吃，是朋友圈里的美食雷达！"
        },
        {
            title: "🍰 顶级吃货王者",
            desc: "你是顶级吃货王者！爱吃、能吃、会吃，美食就是你的信仰。你乐观又治愈，对生活充满热情，吃遍天下美食就是你的终极目标！"
        },
        {
            title: "🥤 精致品味家",
            desc: "你是精致品味家！吃东西讲究颜值、环境、口感，喜欢仪式感，你对生活有追求，温柔又有格调，吃也要吃得美美哒！"
        },
        {
            title: "🍟 随性快乐吃货",
            desc: "你是随性快乐吃货！不挑剔、不纠结，好吃就多吃点，开心最重要。你性格洒脱、心态超好，简单又容易幸福，超可爱！"
        }
    ];

    function startTest() {
        score = 0; current = 0;
        startBox.style.display = "none";
        testBox.style.display = "block";
        updateProgress(); showQuestion();
    }

    function showQuestion() {
        questionArea.innerHTML = `<div class="question">${questions[current]}</div>`;
    }

    function updateProgress() {
        progress.style.width = (current / questions.length) * 100 + "%";
    }

    function next(point) {
        score += point; current++;
        updateProgress();
        if (current < questions.length) showQuestion();
        else showResult();
    }

    function showResult() {
        testBox.style.display = "none";
        resultBox.style.display = "block";
        let level;
        if (score <= 30) level = 0;
        else if (score <= 40) level = 1;
        else if (score <= 50) level = 2;
        else if (score <= 60) level = 3;
        else if (score <= 70) level = 4;
        else level = 5;

        resultArea.innerHTML = `
            <h2 class="result-title">${results[level].title}</h2>
            <p class="result-desc">${results[level].desc}</p>
        `;
    }

    function restartTest() {
        resultBox.style.display = "none";
        startBox.style.display = "block";
    }
</script>
</body>
</html>
