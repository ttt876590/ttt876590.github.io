<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趣味测试大厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "微软雅黑", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fdf6f8, #fce4ec, #f8bbd0, #bae6fd);
            background-size: 200% 200%;
            animation: bgGradient 8s infinite alternate ease-in-out;
            padding: 30px 20px;
            min-height: 100vh;
        }

        @keyframes bgGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: titleFade 1s ease forwards;
            opacity: 0;
            transform: translateY(-20px);
        }

        @keyframes titleFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: 32px;
            color: #ff2442;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .header p {
            font-size: 16px;
            color: #666;
        }

        .test-card {
            background: white;
            border-radius: 28px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.08);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: cardPop 0.7s ease backwards;
            position: relative;
            overflow: hidden;
        }

        .test-card:before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .test-card:hover:before {
            left: 100%;
        }

        @keyframes cardPop {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .test-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 16px 36px rgba(0,0,0,0.12);
        }

        .test-card:nth-child(1){ animation-delay:0.1s; }
        .test-card:nth-child(2){ animation-delay:0.2s; }
        .test-card:nth-child(3){ animation-delay:0.3s; }
        .test-card:nth-child(4){ animation-delay:0.4s; }
        .test-card:nth-child(5){ animation-delay:0.5s; }
        .test-card:nth-child(6){ animation-delay:0.6s; }
        .test-card:nth-child(7){ animation-delay:0.7s; }

        .test-card .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .test-card h2 {
            font-size: 22px;
            color: #333;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .test-card p {
            font-size: 14px;
            color: #777;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .test-card .btn {
            display: inline-block;
            background: #ff2442;
            color: white;
            padding:14px 32px;
            border-radius:30px;
            font-size:16px;
            text-decoration: none;
            box-shadow:0 4px 12px rgba(255,36,66,0.2);
            transition: all 0.3s ease;
        }

        .test-card .btn:hover {
            transform: translateY(-2px);
            box-shadow:0 6px 16px rgba(255,36,66,0.3);
        }

        .test-card.blue .btn {
            background: #0284c7;
            box-shadow:0 4px 12px rgba(2,132,199,0.2);
        }
        .test-card.yellow .btn { background: #ff9800; }
        .test-card.pink .btn { background: #ec407a; }
        .test-card.purple .btn { background: #7e57c2; }
        .test-card.green .btn { background: #26a69a; }
        .test-card.orange .btn { background: #ff5722; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🧩 趣味测试大厅</h1>
        <p>小红书超火 · 全套爆款测试</p>
    </div>

    <div class="test-card" onclick="location.href='personality.html'">
        <div class="icon">🔮</div>
        <h2>隐藏人格测试</h2>
        <p>20题精准测试<br>测出你不为人知的真实性格</p>
        <a class="btn">开始测试</a>
    </div>

    <div class="test-card blue" onclick="location.href='career.html'">
        <div class="icon">🚀</div>
        <h2>适合你的工作</h2>
        <p>20题专业测评<br>找到最适合你的职业方向</p>
        <a class="btn">开始测试</a>
    </div>

    <div class="test-card yellow" onclick="location.href='food.html'">
        <div class="icon">🍔</div>
        <h2>吃货属性测试</h2>
        <p>20题超准测试<br>测出你是什么级别的吃货</p>
        <a class="btn">开始测试</a>
    </div>

    <div class="test-card pink" onclick="location.href='love.html'">
        <div class="icon">💘</div>
        <h2>恋爱天赋测试</h2>
        <p>20题超甜测试<br>测出你的恋爱天赋有多高</p>
        <a class="btn">开始测试</a>
    </div>

    <div class="test-card purple" onclick="location.href='beauty.html'">
        <div class="icon">✨</div>
        <h2>颜值等级测试</h2>
        <p>20题趣味测试<br>测出你的真实颜值等级</p>
        <a class="btn">开始测试</a>
    </div>

    <div class="test-card green" onclick="location.href='eq.html'">
        <div class="icon">🧠</div>
        <h2>情商有多高</h2>
        <p>20题专业测试<br>测出你的真实情商水平</p>
        <a class="btn">开始测试</a>
    </div>

    <div class="test-card orange" onclick="location.href='luck.html'">
        <div class="icon">🍀</div>
        <h2>未来运势测试</h2>
        <p>20题超准测试<br>测出你接下来的好运</p>
        <a class="btn">开始测试</a>
    </div>

    <div class="footer" style="text-align:center; margin-top:30px; font-size:13px; color:#999">
        🧧 小红书爆款测试合集
    </div>
</div>

</body>
</html>
