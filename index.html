<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书隐藏人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "微软雅黑", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fdf6f8, #fce4ec, #f8bbd0);
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
            min-height: 100vh;
            animation: bgGradient 6s infinite alternate ease-in-out;
            background-size: 200% 200%;
        }

        @keyframes bgGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 36px;
            margin-bottom: 20px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
            animation: cardFadeIn 0.7s ease forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes cardFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            color: #ff2442;
            font-size: 28px;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .sub-title {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .question {
            font-size: 19px;
            color: #333;
            margin: 24px 0;
            line-height: 1.7;
            text-align: center;
            animation: questionPop 0.5s ease;
            font-weight: 500;
        }

        @keyframes questionPop {
            0% { opacity: 0; transform: scale(0.9) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .btn {
            background: #ff2442;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 17px;
            width: 100%;
            font-size: 16px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 14px rgba(255, 36, 66, 0.25);
            position: relative;
            overflow: hidden;
        }

        .btn:before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover:before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 18px rgba(255, 36, 66, 0.35);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .result-title {
            font-size: 26px;
            color: #ff2442;
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
            animation: resultBigPop 0.7s ease;
        }

        @keyframes resultBigPop {
            0% { transform: scale(0.7); opacity: 0; }
            50% { transform: scale(1.12); }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-desc {
            font-size: 17px;
            color: #444;
            line-height: 1.9;
            margin: 14px 0;
            text-align: center;
            animation: fadeUp 0.6s ease 0.2s forwards;
            opacity: 0;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
            from { opacity: 0; transform: translateY(10px); }
        }

        .restart {
            background: #fff;
            color: #ff2442;
            border: 2px solid #ff2442;
            margin-top: 25px;
        }

        .progress {
            width: 100%;
            height: 8px;
            background: #f5f5f5;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff2442, #ff5973);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-radius: 10px;
        }

        .tip {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-top: 12px;
        }
    </style>
</head>

<body>
    <div class="card" id="startBox">
        <h1 class="title">🔮 隐藏人格测试</h1>
        <p class="sub-title">小红书超火 · 20题精准测性格</p>
        <button class="btn" onclick="startTest()">开始测试</button>
        <div class="tip">💡 凭第一直觉选择，结果更准哦</div>
    </div>

    <div class="card" id="testBox" style="display:none;">
        <div class="progress">
            <div class="progress-bar" id="progress"></div>
        </div>
        <div id="questionArea"></div>
        <button class="btn" onclick="next(1)">A 完全符合</button>
        <button class="btn" onclick="next(2)">B 比较符合</button>
        <button class="btn" onclick="next(3)">C 不太符合</button>
        <button class="btn" onclick="next(4)">D 完全不符合</button>
    </div>

    <div class="card" id="resultBox" style="display:none;">
        <div id="resultArea"></div>
        <button class="btn restart" onclick="restartTest()">重新测试</button>
    </div>

    <script>
        let score = 0;
        let current = 0;

        // 20道顶配题目
        const questions = [
            "1. 遇到烦心事，你更愿意自己消化。",
            "2. 你喜欢提前规划好每天的行程。",
            "3. 社交场合中，你通常是主动的一方。",
            "4. 你很容易被生活中的小细节打动。",
            "5. 你习惯先完成任务，再放松娱乐。",
            "6. 你偶尔会想一个人待着，远离人群。",
            "7. 你做决定时通常很果断。",
            "8. 你很在意别人对你的看法。",
            "9. 你喜欢尝试新鲜事物、挑战未知。",
            "10. 你觉得自己是一个情绪稳定的人。",
            "11. 你更喜欢宅家，而不是出门聚会。",
            "12. 你很容易原谅别人的过错。",
            "13. 你做事追求完美，不喜欢敷衍。",
            "14. 你在朋友眼中是很有趣的人。",
            "15. 你面对压力时能保持冷静。",
            "16. 你常常会陷入回忆与感慨。",
            "17. 你喜欢干净整洁、井井有条的环境。",
            "18. 你不喜欢麻烦别人，习惯独立解决问题。",
            "19. 你容易对重复的事情感到厌倦。",
            "20. 你相信真诚永远是最打动人的品质。"
        ];

        // 6种精准结果
        const results = [
            { title: "🌙 温柔治愈型人格", desc: "你内心柔软、共情力极强，总能照顾到身边人的情绪。你喜欢安静舒适的生活，不爱争执，是朋友心中最温暖、最靠谱的倾听者。" },
            { title: "☀️ 阳光开朗型人格", desc: "你热情大方、充满活力，走到哪里都能带来快乐。你热爱生活、敢于表达，天生自带感染力，是人群中的小太阳，让人忍不住靠近。" },
            { title: "✨ 理智清醒型人格", desc: "你冷静理性、做事有条理，遇到问题从不慌乱。你目标明确、执行力强，对自己有清晰认知，逻辑清晰，是天生的领导者与决策者。" },
            { title: "💫 自由随性型人格", desc: "你讨厌束缚、追求自在，喜欢跟着感觉走。你乐观豁达、不拘小节，生活态度松弛通透，不被世俗定义，活得潇洒又快乐。" },
            { title: "🌿 沉稳内敛型人格", desc: "你低调踏实、心思细腻，不喜欢张扬。你做事认真负责、情绪稳定，给人满满的安全感，是值得信赖的伙伴。" },
            { title: "🌟 灵动创造型人格", desc: "你思维活跃、脑洞超大，充满创意与灵感。你不喜欢墨守成规，总能用独特的视角看待世界，自带有趣的灵魂。" }
        ];

        // 开始测试
        function startTest() {
            score = 0;
            current = 0;
            startBox.style.display = "none";
            testBox.style.display = "block";
            updateProgress();
            showQuestion();
        }

        // 显示题目
        function showQuestion() {
            questionArea.innerHTML = `<div class="question">${questions[current]}</div>`;
        }

        // 进度条
        function updateProgress() {
            let percent = (current / questions.length) * 100;
            progress.style.width = percent + "%";
        }

        // 下一题
        function next(point) {
            score += point;
            current++;
            updateProgress();
            if (current < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        // 显示结果
        function showResult() {
            testBox.style.display = "none";
            resultBox.style.display = "block";
            let level;

            if (score <= 30) level = 0;
            else if (score <= 40) level = 1;
            else if (score <= 50) level = 2;
            else if (score <= 60) level = 3;
            else if (score <= 70) level = 4;
            else level = 5;

            resultArea.innerHTML = `
                <h2 class="result-title">${results[level].title}</h2>
                <p class="result-desc">${results[level].desc}</p>
            `;
        }

        // 重新测试
        function restartTest() {
            resultBox.style.display = "none";
            startBox.style.display = "block";
        }
    </script>
</body>
</html>
