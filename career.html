<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 适合你的工作测试｜20题精准版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "微软雅黑", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe, #bae6fd);
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
            min-height: 100vh;
            animation: bgGradient 6s infinite alternate ease-in-out;
            background-size: 200% 200%;
        }

        @keyframes bgGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 36px;
            margin-bottom: 20px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
            animation: cardFadeIn 0.7s ease forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes cardFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            color: #0284c7;
            font-size: 28px;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .sub-title {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .question {
            font-size: 19px;
            color: #333;
            margin: 24px 0;
            line-height: 1.7;
            text-align: center;
            animation: questionPop 0.5s ease;
            font-weight: 500;
        }

        @keyframes questionPop {
            0% { opacity: 0; transform: scale(0.9) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .btn {
            background: #0284c7;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 17px;
            width: 100%;
            font-size: 16px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 14px rgba(2, 132, 199, 0.25);
            position: relative;
            overflow: hidden;
        }

        .btn:before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover:before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 18px rgba(2, 132, 199, 0.35);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .result-title {
            font-size: 26px;
            color: #0284c7;
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
            animation: resultBigPop 0.7s ease;
        }

        @keyframes resultBigPop {
            0% { transform: scale(0.7); opacity: 0; }
            50% { transform: scale(1.12); }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-desc {
            font-size: 17px;
            color: #444;
            line-height: 1.9;
            margin: 14px 0;
            text-align: center;
            animation: fadeUp 0.6s ease 0.2s forwards;
            opacity: 0;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
            from { opacity: 0; transform: translateY(10px); }
        }

        .restart {
            background: #fff;
            color: #0284c7;
            border: 2px solid #0284c7;
            margin-top: 25px;
        }

        .progress {
            width: 100%;
            height: 8px;
            background: #f5f5f5;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #0284c7, #38bdf8);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-radius: 10px;
        }

        .tip {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-top: 12px;
        }
    </style>
</head>

<body>
    <div class="card" id="startBox">
        <h1 class="title">🔍 适合你的工作测试</h1>
        <p class="sub-title">小红书超火 · 20题精准测职业</p>
        <button class="btn" onclick="startTest()">开始测试</button>
        <div class="tip">💡 凭第一直觉选择，结果更准哦</div>
    </div>

    <div class="card" id="testBox" style="display:none;">
        <div class="progress">
            <div class="progress-bar" id="progress"></div>
        </div>
        <div id="questionArea"></div>
        <button class="btn" onclick="next(1)">A 完全符合</button>
        <button class="btn" onclick="next(2)">B 比较符合</button>
        <button class="btn" onclick="next(3)">C 不太符合</button>
        <button class="btn" onclick="next(4)">D 完全不符合</button>
    </div>

    <div class="card" id="resultBox" style="display:none;">
        <div id="resultArea"></div>
        <button class="btn restart" onclick="restartTest()">重新测试</button>
    </div>

    <script>
        let score = 0;
        let current = 0;

        // 20道 职业/工作适配 测试题
        const questions = [
            "1. 你喜欢独立完成工作，不喜欢过多打扰。",
            "2. 你擅长与人沟通、说服或安抚他人。",
            "3. 你对数字、逻辑、规则类事情很敏感。",
            "4. 你喜欢创作、设计、写作等创意工作。",
            "5. 你喜欢带领团队、安排任务、做决策。",
            "6. 你喜欢稳定规律，不喜欢频繁变动。",
            "7. 你喜欢研究、分析、探索未知问题。",
            "8. 你很有耐心，愿意长期重复做精细工作。",
            "9. 你喜欢帮助别人、服务他人获得成就感。",
            "10. 你喜欢自由灵活，不喜欢被束缚。",
            "11. 你喜欢表达自己、展示自己、被关注。",
            "12. 你做事严谨细致，很少出错。",
            "13. 你喜欢挑战、竞争、追求高回报。",
            "14. 你喜欢安静思考，深度钻研一件事。",
            "15. 你擅长组织活动、安排流程、协调事务。",
            "16. 你对美、审美、搭配有天然敏感度。",
            "17. 你喜欢学习新知识，不断提升自己。",
            "18. 你愿意承担压力，完成高难度目标。",
            "19. 你喜欢动手实操，解决实际问题。",
            "20. 你很有同理心，容易理解他人感受。"
        ];

        // 6种 精准职业结果
        const results = [
            { 
                title: "💼 全能管理型人才", 
                desc: "你适合：管理者、项目经理、创业者、主管。你领导力强、果断有主见，擅长统筹规划，天生适合带领团队、掌控全局，能在压力中做出正确决策。" 
            },
            { 
                title: "🎨 创意艺术型人才", 
                desc: "你适合：设计师、文案、博主、摄影师、编导。你脑洞大、审美在线、灵感丰富，讨厌束缚，喜欢自由创作，能在创意领域闪闪发光。" 
            },
            { 
                title: "📊 理性技术型人才", 
                desc: "你适合：程序员、会计、工程师、分析师、科研人员。你逻辑清晰、做事严谨、专注力强，擅长钻研技术与规则，靠专业能力立足。" 
            },
            { 
                title: "🤝 沟通服务型人才", 
                desc: "你适合：教师、医护、HR、客服、公关、销售。你共情力强、擅长沟通、耐心温柔，能在与人打交道的工作中获得最大成就感。" 
            },
            { 
                title: "🔍 沉稳执行型人才", 
                desc: "你适合：行政、文员、法务、财务、运营。你踏实稳重、细致靠谱、执行力强，喜欢稳定有序的工作，是团队中最可靠的核心支柱。" 
            },
            { 
                title: "🚀 自由挑战型人才", 
                desc: "你适合：自由职业、自媒体、创业、市场、投资。你热爱自由、敢于冒险、追求突破，不喜欢被规则限制，适合靠能力闯出新天地。" 
            }
        ];

        // 开始测试
        function startTest() {
            score = 0;
            current = 0;
            startBox.style.display = "none";
            testBox.style.display = "block";
            updateProgress();
            showQuestion();
        }

        // 显示题目
        function showQuestion() {
            questionArea.innerHTML = `<div class="question">${questions[current]}</div>`;
        }

        // 进度条
        function updateProgress() {
            let percent = (current / questions.length) * 100;
            progress.style.width = percent + "%";
        }

        // 下一题
        function next(point) {
            score += point;
            current++;
            updateProgress();
            if (current < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        // 显示结果
        function showResult() {
            testBox.style.display = "none";
            resultBox.style.display = "block";
            let level;

            if (score <= 30) level = 0;
            else if (score <= 40) level = 1;
            else if (score <= 50) level = 2;
            else if (score <= 60) level = 3;
            else if (score <= 70) level = 4;
            else level = 5;

            resultArea.innerHTML = `
                <h2 class="result-title">${results[level].title}</h2>
                <p class="result-desc">${results[level].desc}</p>
            `;
        }

        // 重新测试
        function restartTest() {
            resultBox.style.display = "none";
            startBox.style.display = "block";
        }
    </script>
</body>
</html>
